<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Audit | SutraX</title>
    <link href="https://fonts.googleapis.com/css2?family=Michroma&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-base: #05050A; --bg-panel: rgba(18, 18, 28, 0.65); --border-subtle: rgba(255, 255, 255, 0.05); --text-main: #F8FAFC; --text-muted: #94A3B8; --indigo: #818CF8; --emerald: #34D399; --pink: #F472B6; --cyan: #22D3EE; --amber: #FBBF24;}
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-base); color: var(--text-main); min-height: 100vh; display: flex; overflow-x: hidden; background-image: radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.1) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(52, 211, 153, 0.08) 0%, transparent 40%); background-attachment: fixed; }
        .sidebar { width: 260px; background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(20px); border-right: 1px solid var(--border-subtle); padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 2rem; position: fixed; height: 100vh; z-index: 10; }
        .brand { display: flex; align-items: center; gap: 1rem; }
        .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--indigo), var(--cyan)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px;}
        .brand-text h1 { font-family: 'Michroma', sans-serif; font-size: 1.3rem; font-weight: 400; background: linear-gradient(135deg, #F8FAFC 0%, #818CF8 80%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase;}
        .brand-text h1 span { background: linear-gradient(135deg, #22D3EE, #F472B6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .brand-text p { font-size: 0.75rem; color: var(--emerald); font-family: 'JetBrains Mono'; }
        .nav-menu { display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 8px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 0.8rem; transition: all 0.3s ease; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .nav-item.active { background: rgba(99, 102, 241, 0.1); color: var(--indigo); border-left: 3px solid var(--indigo); }
        .main-content { margin-left: 260px; padding: 2rem 3rem; width: calc(100% - 260px); }
        .header { margin-bottom: 2rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 1.5rem; }
        .header h2 { font-size: 1.8rem; font-weight: 700; }
        .header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.4rem; }
        .terminal { background: #0A0A10; border: 1px solid #333; border-radius: 12px; padding: 1.5rem; height: 400px; overflow-y: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; line-height: 1.6; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .terminal::-webkit-scrollbar { width: 8px; }
        .terminal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .log-time { color: var(--text-muted); margin-right: 15px; }
        .log-info { color: var(--cyan); }
        .log-secure { color: var(--emerald); }
        .log-hash { color: var(--pink); font-size: 0.75rem;}
        .privacy-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 1.5rem; }
        .stat-card { background: rgba(251, 191, 36, 0.05); border: 1px solid rgba(251, 191, 36, 0.2); border-radius: 12px; padding: 1.5rem; text-align: center;}
        .stat-card h4 { color: var(--amber); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem;}
        .stat-card .val { font-size: 2rem; font-family: 'JetBrains Mono'; font-weight: 700; color: var(--text-main); }
        @media (max-width: 1024px) {
            .privacy-stats { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border-subtle); padding: 1.5rem 1rem 1rem; z-index: 10; gap: 1rem; }
            .brand { justify-content: center; }
            .nav-menu { flex-direction: row; overflow-x: auto; padding-bottom: 0.5rem; gap: 0.8rem; -webkit-overflow-scrolling: touch; }
            .nav-menu::-webkit-scrollbar { height: 4px; }
            .nav-menu::-webkit-scrollbar-thumb { background: rgba(129, 140, 248, 0.5); border-radius: 4px; }
            .nav-item { flex: 0 0 auto; font-size: 0.85rem; padding: 0.6rem 1rem; }
            .main-content { margin-left: 0; width: 100%; padding: 1.5rem 1rem; }
            .header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .header h2 { font-size: 1.5rem; }
            .privacy-stats { grid-template-columns: 1fr; gap: 1rem; }
            .terminal { height: 300px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand"><div class="brand-icon">💠</div><div class="brand-text"><h1>Sutra<span>X</span></h1><p>v2.0 • DP-Secure</p></div></div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-item">📊 Dashboard</a>
            <a href="nodes.html" class="nav-item">🏥 Nodes</a>
            <a href="causal.html" class="nav-item">🧠 Causal</a>
            <a href="privacy.html" class="nav-item active">🔐 Privacy</a>
            <a href="settings.html" class="nav-item">⚙️ Settings</a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="header">
            <h2>Differential Privacy Audit Log</h2>
            <p>Real-time monitoring of cryptographic noise injection and network transfers to prove Zero-PII compliance.</p>
        </header>
        <div class="terminal" id="terminal-log">
        </div>
        <div class="privacy-stats">
            <div class="stat-card"><h4>Current Epsilon (ε)</h4><div class="val" id="dp-val">2.0</div></div>
            <div class="stat-card"><h4>Delta (δ)</h4><div class="val">10⁻⁵</div></div>
            <div class="stat-card"><h4>Raw PII Leaked</h4><div class="val" style="color: var(--emerald);">0 Bytes</div></div>
        </div>
    </main>
    <script>
        if(localStorage.getItem('fedEpsilon')) {
            document.getElementById('dp-val').innerText = localStorage.getItem('fedEpsilon');
        }
        const terminal = document.getElementById('terminal-log');
        const logs = [
            "Initializing secure federated aggregator socket...",
            "[Node Alpha] Local gradient computing complete.",
            "[Node Alpha] Injecting Laplacian noise (Scale: 1.5)...",
            "[Node Alpha] Clipping gradients (Norm C: 1.5)...",
            "<span class='log-secure'>[Node Alpha] Payload encrypted:</span> <span class='log-hash'>0x7F8B9C2A1D...</span>",
            "Receiving encrypted weights from Node Alpha.",
            "[Node Beta] Local gradient computing complete.",
            "[Node Beta] Injecting Laplacian noise (Scale: 1.5)...",
            "<span class='log-secure'>[Node Beta] Payload encrypted:</span> <span class='log-hash'>0x3E4F5A6B7C...</span>",
            "Receiving encrypted weights from Node Beta.",
            "<span class='log-info'>[Aggregator] Performing secure FedProx averaging...</span>",
            "<span class='log-info'>[Aggregator] Global model updated. Broadcast pending.</span>",
            "Round 10 completed. Total privacy budget consumed: ε=0.42"
        ];
        let index = 0;
        function printLog() {
            if (index < logs.length) {
                const now = new Date();
                const time = `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}.${now.getMilliseconds()}`;
                terminal.innerHTML += `<div><span class="log-time">[${time}]</span> ${logs[index]}</div>`;
                terminal.scrollTop = terminal.scrollHeight;
                index++;
                setTimeout(printLog, Math.random() * 800 + 200);
            }
        }
        setTimeout(printLog, 500);
    </script>
</body>
</html>
